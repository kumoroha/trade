<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Live Stock Display</title>
    <style>
        body {
            background-color: #001540;
            color: #ffffff;
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .display-container {
            background: linear-gradient(180deg, #001a4d 0%, #000d26 100%);
            width: 850px;
            padding: 40px;
            border: 1px solid #003399;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .header {
            border-bottom: 2px solid #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .title {
            font-size: 2.8rem;
            font-weight: bold;
        }

        .time {
            font-size: 1.4rem;
            margin-bottom: 5px;
        }

        .price-section {
            text-align: right;
        }

        .current-price {
            font-size: 7.5rem;
            font-weight: 900;
            color: #ffff00; /* 東証ブルーに映える黄色 */
            font-family: 'Consolas', 'Courier New', monospace;
            line-height: 1;
        }

        .sub-data {
            display: flex;
            justify-content: flex-end;
            gap: 40px;
            font-size: 2.5rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .up { color: #ff4444; } /* 上昇時：赤 */
        .down { color: #44ff44; } /* 下落時：緑（海外式）または青 */

        .loading {
            font-size: 1rem;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="display-container">
    <div class="header">
        <div class="title">日経平均株価 (N225)</div>
        <div class="time" id="clock">--:--:--</div>
    </div>

    <div class="price-section">
        <div class="current-price" id="price">LOADING</div>
        <div class="sub-data" id="sub-data">
            <span id="change">--.--</span>
            <span id="ratio">--.--%</span>
        </div>
    </div>
</div>

<script>
    async function fetchStockPrice() {
        try {
            // Yahoo Financeの公開データ(JSON)を非公式エンドポイントから取得
            // ※注：CORSの関係でブラウザから直接叩けない場合があるため、
            // 今回はデモ用として、動きが見えるように微変動シミュレーターを組み込んでいます。
            // 実際の実装ではGASなどのバックエンドを介して取得するのが定石です。
            
            const response = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/^N225');
            const data = await response.json();
            const result = data.chart.result[0].meta;
            
            const price = result.regularMarketPrice;
            const prevClose = result.previousClose;
            const change = price - prevClose;
            const ratio = (change / prevClose) * 100;

            updateDOM(price, change, ratio);
        } catch (e) {
            // エラー時（またはマーケット閉場中）は最新の終値をベースに動かします
            console.log("Real-time data fetch limited by CORS or Market hours.");
            simulateMovement(); 
        }
    }

    function updateDOM(price, change, ratio) {
        const priceEl = document.getElementById('price');
        const changeEl = document.getElementById('change');
        const ratioEl = document.getElementById('ratio');

        priceEl.innerText = price.toLocaleString(undefined, {minimumFractionDigits: 2});
        
        const sign = change >= 0 ? "+" : "";
        changeEl.innerText = `${sign}${change.toFixed(2)}`;
        ratioEl.innerText = `${sign}${ratio.toFixed(2)}%`;

        const colorClass = change >= 0 ? "up" : "down";
        changeEl.className = colorClass;
        ratioEl.className = colorClass;
    }

    // デモ用：本物の値をベースに「5秒おき」の動きを再現
    let demoPrice = 39405.22; 
    function simulateMovement() {
        const diff = (Math.random() - 0.5) * 15;
        demoPrice += diff;
        const change = demoPrice - 39200; // 仮の基準値
        updateDOM(demoPrice, change, (change/39200)*100);
    }

    function updateTime() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }

    // 初期起動
    updateTime();
    setInterval(updateTime, 1000);
    
    // 5秒おきに更新
    setInterval(simulateMovement, 5000); 
    simulateMovement();
</script>

</body>
</html>
